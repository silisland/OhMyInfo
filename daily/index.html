<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OhMyInfo - 所有日报</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1rem;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #111;
      border-bottom: 2px solid #e1e4e8;
      padding-bottom: 0.5rem;
    }
    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .digest-list {
      list-style: none;
      padding: 0;
    }
    .digest-list li {
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      background: #fff;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      transition: border-color 0.2s;
    }
    .digest-list li:hover {
      border-color: #0366d6;
    }
    .digest-list a {
      color: #0366d6;
      text-decoration: none;
      font-weight: 500;
    }
    .digest-list a:hover {
      text-decoration: underline;
    }
    .digest-list .date {
      color: #666;
      font-size: 0.85rem;
      margin-left: 0.5rem;
    }
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #666;
    }
    .latest-link {
      display: inline-block;
      margin-bottom: 1.5rem;
      padding: 0.5rem 1rem;
      background: #0366d6;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
    }
    .latest-link:hover {
      background: #0256b9;
    }
    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>OhMyInfo - 技术日报</h1>
  <p class="subtitle">每日技术情报汇总 · 自动生成 · 开源免费</p>

  <a class="latest-link" href="./latest.html">📄 查看最新日报</a>

  <h2>所有日报</h2>

  <ul class="digest-list" id="digest-list">
    <li class="empty-state">暂无日报，请等待首次运行完成。</li>
  </ul>

  <footer>
    <p>由 <a href="https://github.com/GreedArch/OhMyInfo">OhMyInfo</a> 自动生成 · 每 6 小时更新</p>
  </footer>

  <script>
    // Fetch the list of available digests from the GitHub API or directory listing
    // Since GitHub Pages doesn't generate directory listings by default,
    // we use a workaround: fetch latest.md and list known digests from a JSON index.
    //
    // The pipeline generates an index.json alongside each digest.
    // Fallback: just link to latest.html if no index is available.

    async function loadDigests() {
      try {
        const response = await fetch('./index.json');
        if (!response.ok) throw new Error('No index found');
        const data = await response.json();
        const list = document.getElementById('digest-list');
        list.innerHTML = '';

        if (data.digests && data.digests.length > 0) {
          data.digests.forEach(function(digest) {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = digest.file;
            a.textContent = digest.title || digest.file;
            li.appendChild(a);

            if (digest.date) {
              const span = document.createElement('span');
              span.className = 'date';
              span.textContent = digest.date;
              li.appendChild(span);
            }

            list.appendChild(li);
          });
        } else {
          list.innerHTML = '<li class="empty-state">暂无日报记录。</li>';
        }
      } catch (e) {
        // No index.json yet — show latest link only
        console.log('Digest index not available yet.');
      }
    }

    loadDigests();
  </script>
</body>
</html>

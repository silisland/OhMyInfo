<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OhMyInfo · 关注领域管理</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* =========================================================================
       Preferences Page — Specific Styles
       ========================================================================= */

    /* ---- Page Layout ---- */
    .page-header {
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 2rem;
    }

    .page-header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .page-title .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: #fff;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      padding: 0.4rem 0.8rem;
      border-radius: var(--radius-sm);
      transition: all var(--transition-fast);
    }

    .back-link:hover {
      color: var(--accent);
      background: var(--accent-subtle);
    }

    /* ---- Main Content ---- */
    .prefs-content {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ---- Tags Input Section ---- */
    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      min-height: 2.5rem;
      padding: 0.5rem;
      margin-bottom: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background: var(--input-bg);
      transition: border-color var(--transition-fast);
    }

    .tags-container:focus-within {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 3px var(--input-focus-glow);
    }

    .tags-container-empty {
      justify-content: center;
      align-items: center;
      color: var(--text-tertiary);
      font-size: 0.85rem;
      min-height: 4rem;
    }

    /* ---- Tag Pill ---- */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.7rem 0.3rem 0.85rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--tag-text);
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      border-radius: var(--radius-full);
      cursor: default;
      user-select: none;
      animation: tagIn 200ms var(--ease-out);
      transition: all var(--transition-fast);
      position: relative;
    }

    .tag:hover {
      border-color: var(--border-accent);
    }

    .tag-remove {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      font-size: 0.6rem;
      line-height: 1;
      border: none;
      background: transparent;
      color: var(--tag-text);
      border-radius: 50%;
      cursor: pointer;
      opacity: 0.6;
      transition: all var(--transition-fast);
      padding: 0;
    }

    .tag-remove:hover {
      opacity: 1;
      background: var(--tag-remove-hover);
      color: #fff;
    }

    .tag.tag-out {
      animation: tagOut 200ms var(--ease-in-out) forwards;
    }

    @keyframes tagIn {
      from {
        opacity: 0;
        transform: scale(0.85);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes tagOut {
      to {
        opacity: 0;
        transform: scale(0.75);
      }
    }

    /* ---- Tag Input Field ---- */
    .tag-input-wrapper {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 160px;
    }

    .tag-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 0.88rem;
      font-family: var(--font-sans);
      color: var(--input-text);
      padding: 0.35rem 0.25rem;
      min-width: 120px;
    }

    .tag-input::placeholder {
      color: var(--input-placeholder);
    }

    .tag-count {
      font-size: 0.78rem;
      color: var(--text-tertiary);
      white-space: nowrap;
      padding-left: 0.5rem;
    }

    .tag-count.limit-near {
      color: var(--warning);
    }

    .tag-count.limit-reached {
      color: var(--error);
    }

    /* ---- Empty State ---- */
    .empty-tags {
      color: var(--text-tertiary);
      font-size: 0.85rem;
      padding: 0.3rem 0;
      user-select: none;
    }

    /* ---- Suggestions Section ---- */
    .suggestions-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .suggestion-tag {
      display: inline-flex;
      align-items: center;
      padding: 0.4rem 0.85rem;
      font-size: 0.82rem;
      font-weight: 450;
      color: var(--suggestion-text);
      background: var(--suggestion-bg);
      border: 1px solid var(--suggestion-border);
      border-radius: var(--radius-full);
      cursor: pointer;
      user-select: none;
      transition: all var(--transition-fast);
    }

    .suggestion-tag:hover {
      color: var(--text-primary);
      background: var(--suggestion-hover);
      border-color: var(--border-hover);
    }

    .suggestion-tag.added {
      color: var(--tag-text);
      background: var(--tag-bg);
      border-color: var(--tag-border);
      cursor: default;
      opacity: 0.6;
      pointer-events: none;
    }

    .suggestion-tag .plus-icon {
      margin-right: 0.25rem;
      font-size: 0.7rem;
      opacity: 0.6;
    }

    /* ---- Impact Preview (Radar) ---- */
    .radar-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .source-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      transition: all var(--transition-fast);
    }

    .source-item.active {
      border-color: rgba(46, 213, 115, 0.25);
      background: var(--success-bg);
    }

    .source-item.inactive {
      opacity: 0.45;
    }

    .source-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
      background: var(--bg-elevated);
    }

    .source-item.active .source-icon {
      background: rgba(46, 213, 115, 0.15);
    }

    .source-info {
      flex: 1;
      min-width: 0;
    }

    .source-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-desc {
      font-size: 0.72rem;
      color: var(--text-tertiary);
      margin-top: 0.1rem;
    }

    .source-status {
      flex-shrink: 0;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .source-status.active {
      color: var(--success);
    }

    .source-status.inactive {
      color: var(--text-tertiary);
    }

    .radar-summary {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .radar-summary strong {
      color: var(--text-primary);
    }

    /* ---- Action Buttons ---- */
    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    /* ---- Export Modal ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: fadeIn 200ms var(--ease-out);
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      max-width: 520px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      animation: scaleIn 250ms var(--ease-out);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-close {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 1rem;
      transition: all var(--transition-fast);
    }

    .modal-close:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .modal-body {
      margin-bottom: 1rem;
    }

    .yaml-output {
      width: 100%;
      min-height: 180px;
      padding: 1rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      resize: vertical;
      outline: none;
      tab-size: 2;
    }

    .yaml-output:focus {
      border-color: var(--input-focus-border);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    /* ---- Empty / Placeholder ---- */
    .placeholder-text {
      text-align: center;
      padding: 0.75rem 0;
      color: var(--text-tertiary);
      font-size: 0.85rem;
    }

    /* ---- Responsive ---- */
    @media (max-width: 600px) {
      .page-header-inner {
        padding: 0 1rem;
      }

      .prefs-content {
        padding: 0 1rem 3rem;
      }

      .radar-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }

      .actions .btn {
        width: 100%;
        justify-content: center;
      }

      .modal {
        margin: 0.5rem;
        padding: 1.25rem;
      }
    }
  </style>
</head>
<body>

  <!-- ================================================================
       Page Header
       ================================================================ -->
  <header class="page-header">
    <div class="page-header-inner">
      <div class="page-title">
        <span class="logo">&#x1F52D;</span>
        OhMyInfo <span style="font-weight:400;color:var(--text-secondary);font-size:0.9rem;">· 关注领域管理</span>
      </div>
      <a class="back-link" href="./index.html">&larr; 返回首页</a>
    </div>
  </header>

  <!-- ================================================================
       Main Content
       ================================================================ -->
  <main class="prefs-content">

    <!-- ---- My Interests Section ---- -->
    <section class="card">
      <div class="section-header">
        <i class="icon">&#x1F4CC;</i> 我的关注领域
      </div>

      <div class="tags-container" id="tags-container">
        <!-- Tags rendered by JS -->
        <div class="tag-input-wrapper">
          <input
            type="text"
            class="tag-input"
            id="tag-input"
            placeholder="输入关注领域，按回车添加..."
            maxlength="40"
            autocomplete="off"
          >
        </div>
        <span class="tag-count" id="tag-count">0 / 20</span>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;">
        <p style="font-size:0.78rem;color:var(--text-tertiary);">
          输入关键词添加关注领域。添加后，相关文章将在日报中获得更高优先级。
        </p>
        <button class="btn btn-secondary btn-sm" id="clear-all-btn" style="color:var(--error);">
          &#x1F5D1; 清空全部
        </button>
      </div>
    </section>

    <!-- ---- Quick Add Suggestions ---- -->
    <section class="card">
      <div class="section-header">
        <i class="icon">&#x1F3AF;</i> 快速添加
      </div>
      <p style="font-size:0.8rem;color:var(--text-tertiary);margin-bottom:0.75rem;">
        点击下方标签快速添加常见关注领域：
      </p>
      <div class="suggestions-grid" id="suggestions-grid">
        <!-- Suggestions rendered by JS -->
      </div>
    </section>

    <!-- ---- Impact Preview Section ---- -->
    <section class="card" id="impact-section">
      <div class="section-header">
        <i class="icon">&#x1F4E1;</i> 采集影响预览
      </div>
      <p style="font-size:0.8rem;color:var(--text-tertiary);margin-bottom:1rem;">
        你的关注领域会影响以下数据源的采集策略。绿色高亮的数据源将针对你的兴趣进行搜索或过滤。
      </p>
      <div class="radar-grid" id="radar-grid">
        <!-- Rendered by JS -->
      </div>
      <div class="radar-summary" id="radar-summary">
        尚未添加关注领域 — 添加关键词后，此处将显示各数据源的采集影响。
      </div>
    </section>

    <!-- ---- Actions ---- -->
    <section class="card">
      <div class="section-header">
        <i class="icon">&#x2699;&#xFE0F;</i> 操作
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="save-btn">
          &#x1F4BE; 保存到本地
        </button>
        <button class="btn btn-secondary" id="export-btn">
          &#x1F4CB; 导出 YAML 配置
        </button>
        <button class="btn btn-secondary" id="reset-btn">
          &#x21BA; 恢复默认
        </button>
      </div>
    </section>

  </main>

  <!-- ================================================================
       Export Modal
       ================================================================ -->
  <div class="modal-overlay" id="export-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">&#x1F4CB; 导出 YAML 配置</div>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <p style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:0.75rem;">
          将以下内容复制到 <code style="font-family:var(--font-mono);font-size:0.8rem;padding:0.1rem 0.3rem;background:var(--bg-tertiary);border-radius:3px;">config/preferences.yaml</code> 中：
        </p>
        <textarea class="yaml-output" id="yaml-output" readonly spellcheck="false"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-close-btn">关闭</button>
        <button class="btn btn-primary" id="yaml-copy-btn">&#x1F4CB; 复制到剪贴板</button>
      </div>
    </div>
  </div>

  <!-- ================================================================
       JavaScript
       ================================================================ -->
  <script>
    (function() {
      'use strict';

      /* ------------------------------------------------------------------
         Constants
         ------------------------------------------------------------------ */
      const STORAGE_KEY = 'ohmyinfo_interests';
      const MAX_TAGS = 20;

      const SUGGESTIONS = [
        'AI', 'Machine Learning', 'LLM', 'Rust', 'Python',
        'TypeScript', 'Go', 'WebAssembly', 'Database', 'DevOps',
        'Cloud Native', 'Open Source', 'Security', 'React',
        'Edge Computing', 'Kubernetes', 'Blockchain', 'Computer Vision',
        'NLP', 'Embedded Systems', 'DevTools', 'Startup'
      ];

      const DATA_SOURCES = [
        { id: 'hacker_news',   name: 'Hacker News',     icon: '&#x1F4F0;', desc: '技术社区热度风向标',     action: '过滤' },
        { id: 'github',        name: 'GitHub Trending', icon: '&#x2B55;',  desc: '开源项目趋势',           action: '搜索' },
        { id: 'reddit',        name: 'Reddit',          icon: '&#x1F4AC;', desc: '社区讨论深度内容',       action: '搜索' },
        { id: 'arxiv',         name: 'arXiv',           icon: '&#x1F4D6;', desc: '最新学术论文',           action: '搜索' },
        { id: 'devto',         name: 'Dev.to',          icon: '&#x1F4BB;', desc: '开发者博客与技术文章',    action: '搜索' }
      ];

      /* ------------------------------------------------------------------
         State
         ------------------------------------------------------------------ */
      let tags = [];
      let isDirty = false;

      /* ------------------------------------------------------------------
         DOM References
         ------------------------------------------------------------------ */
      const container = document.getElementById('tags-container');
      const tagInput = document.getElementById('tag-input');
      const tagCount = document.getElementById('tag-count');
      const suggestionsGrid = document.getElementById('suggestions-grid');
      const radarGrid = document.getElementById('radar-grid');
      const radarSummary = document.getElementById('radar-summary');
      const saveBtn = document.getElementById('save-btn');
      const exportBtn = document.getElementById('export-btn');
      const resetBtn = document.getElementById('reset-btn');
      const clearAllBtn = document.getElementById('clear-all-btn');
      const exportModal = document.getElementById('export-modal');
      const yamlOutput = document.getElementById('yaml-output');
      const yamlCopyBtn = document.getElementById('yaml-copy-btn');
      const modalClose = document.getElementById('modal-close');
      const modalCloseBtn = document.getElementById('modal-close-btn');

      /* ------------------------------------------------------------------
         Helpers
         ------------------------------------------------------------------ */
      function normalizeTag(t) {
        return t.trim().replace(/\s+/g, ' ');
      }

      function isValidTag(t) {
        const v = normalizeTag(t);
        return v.length > 0 && v.length <= 40;
      }

      function isDuplicate(t) {
        return tags.some(function(existing) {
          return existing.toLowerCase() === normalizeTag(t).toLowerCase();
        });
      }

      /* ------------------------------------------------------------------
         Toast System
         ------------------------------------------------------------------ */
      function showToast(message, type) {
        type = type || 'info';
        var toastContainer = document.querySelector('.toast-container');
        if (!toastContainer) {
          toastContainer = document.createElement('div');
          toastContainer.className = 'toast-container';
          document.body.appendChild(toastContainer);
        }

        var toast = document.createElement('div');
        toast.className = 'toast toast-' + type;
        toast.textContent = message;
        toastContainer.appendChild(toast);

        setTimeout(function() {
          toast.classList.add('toast-out');
          setTimeout(function() {
            if (toast.parentNode) {
              toast.parentNode.removeChild(toast);
            }
          }, 200);
        }, 2500);
      }

      /* ------------------------------------------------------------------
         Render Tags
         ------------------------------------------------------------------ */
      function renderTags() {
        // Remove all children except the input wrapper
        var children = Array.from(container.children);
        children.forEach(function(child) {
          if (!child.classList.contains('tag-input-wrapper') && !child.classList.contains('tag-count')) {
            container.removeChild(child);
          }
        });

        // Also remove tag-count if it's a direct child (it's at the end)
        // Re-insert tag-input-wrapper and tag-count
        var inputWrapper = container.querySelector('.tag-input-wrapper');
        var countEl = container.querySelector('.tag-count');

        // Clear and rebuild
        container.innerHTML = '';

        if (tags.length === 0) {
          container.classList.add('tags-container-empty');
          var emptyMsg = document.createElement('span');
          emptyMsg.className = 'empty-tags';
          emptyMsg.textContent = '尚未添加关注领域 — 在下方输入关键词开始添加';
          container.appendChild(emptyMsg);
        } else {
          container.classList.remove('tags-container-empty');
          tags.forEach(function(tag, index) {
            var el = document.createElement('span');
            el.className = 'tag';
            el.textContent = tag;

            var removeBtn = document.createElement('button');
            removeBtn.className = 'tag-remove';
            removeBtn.innerHTML = '&#x2715;';
            removeBtn.setAttribute('aria-label', '移除 ' + tag);
            removeBtn.addEventListener('click', function(e) {
              e.stopPropagation();
              removeTag(index);
            });

            el.appendChild(removeBtn);
            container.appendChild(el);
          });
        }

        // Re-add input wrapper and count
        container.appendChild(inputWrapper);
        container.appendChild(countEl);

        updateTagCount();
        updateRadar();
        renderSuggestions();
      }

      /* ------------------------------------------------------------------
         Add / Remove Tags
         ------------------------------------------------------------------ */
      function addTag(raw) {
        var tag = normalizeTag(raw);
        if (!tag) return false;

        if (tag.length > 40) {
          showToast('关键词过长（最多 40 个字符）', 'error');
          return false;
        }

        if (isDuplicate(tag)) {
          showToast('\u201C' + tag + '\u201D 已存在', 'error');
          return false;
        }

        if (tags.length >= MAX_TAGS) {
          showToast('最多添加 ' + MAX_TAGS + ' 个关注领域', 'error');
          return false;
        }

        tags.push(tag);
        isDirty = true;
        renderTags();
        showToast('\u201C' + tag + '\u201D 已添加', 'success');
        return true;
      }

      function removeTag(index) {
        var removed = tags[index];
        tags.splice(index, 1);
        isDirty = true;
        renderTags();
        showToast('\u201C' + removed + '\u201D 已移除', 'info');
      }

      /* ------------------------------------------------------------------
         Tag Input Handlers
         ------------------------------------------------------------------ */
      tagInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          var val = tagInput.value;
          if (val) {
            addTag(val);
            tagInput.value = '';
          }
        }
      });

      // Also add on blur (if content exists)
      tagInput.addEventListener('blur', function() {
        // Don't auto-add on blur — only on Enter
      });

      tagInput.addEventListener('input', function() {
        // Live count feedback
        updateTagCount();
      });

      /* ------------------------------------------------------------------
         Tag Count
         ------------------------------------------------------------------ */
      function updateTagCount() {
        var count = tags.length;
        tagCount.textContent = count + ' / ' + MAX_TAGS;
        tagCount.className = 'tag-count';
        if (count >= MAX_TAGS) {
          tagCount.classList.add('limit-reached');
          tagInput.disabled = true;
          tagInput.placeholder = '已达到上限 (' + MAX_TAGS + ' 个)';
        } else if (count >= MAX_TAGS - 3) {
          tagCount.classList.add('limit-near');
          tagInput.disabled = false;
        } else {
          tagInput.disabled = false;
          tagInput.placeholder = '输入关注领域，按回车添加...';
        }
      }

      /* ------------------------------------------------------------------
         Suggestions
         ------------------------------------------------------------------ */
      function renderSuggestions() {
        if (!suggestionsGrid) return;
        suggestionsGrid.innerHTML = '';

        SUGGESTIONS.forEach(function(s) {
          var el = document.createElement('span');
          el.className = 'suggestion-tag';
          if (tags.some(function(t) { return t.toLowerCase() === s.toLowerCase(); })) {
            el.classList.add('added');
            el.textContent = '\u2713 ' + s;
          } else {
            el.innerHTML = '<span class="plus-icon">+</span>' + s;
            el.addEventListener('click', function() {
              if (addTag(s)) {
                tagInput.value = '';
                tagInput.focus();
              }
            });
          }
          suggestionsGrid.appendChild(el);
        });
      }

      /* ------------------------------------------------------------------
         Impact Radar
         ------------------------------------------------------------------ */
      function updateRadar() {
        if (!radarGrid) return;

        var keywords = tags.length > 0 ? tags : [];
        var hasAny = keywords.length > 0;

        radarGrid.innerHTML = '';

        DATA_SOURCES.forEach(function(source) {
          var item = document.createElement('div');
          item.className = 'source-item';

          var statusText, statusClass;
          if (hasAny) {
            statusText = '\u2705 ' + source.action;
            statusClass = 'active';
            item.classList.add('active');
          } else {
            statusText = '\u23F8\uFE0F 未激活';
            statusClass = 'inactive';
            item.classList.add('inactive');
          }

          var displayKeywords = keywords.slice(0, 2).join('\u3001');
          if (keywords.length > 2) {
            displayKeywords += ' 等 ' + keywords.length + ' 个';
          }

          item.innerHTML =
            '<div class="source-icon">' + source.icon + '</div>' +
            '<div class="source-info">' +
              '<div class="source-name">' + source.name + '</div>' +
              '<div class="source-desc">' + source.desc + '</div>' +
            '</div>' +
            '<div class="source-status ' + statusClass + '">' + statusText + '</div>';

          radarGrid.appendChild(item);
        });

        // Summary
        if (hasAny) {
          var displayKeywords = keywords.join('\u3001');
          radarSummary.innerHTML =
            '\uD83D\uDCA1 <strong>' + keywords.length + '</strong> 个关注领域将影响 <strong>' +
            DATA_SOURCES.length + '</strong> 个数据源的采集策略：' +
            '<span style="color:var(--text-primary);">' + displayKeywords + '</span>';
        } else {
          radarSummary.textContent = '尚未添加关注领域 — 添加关键词后，此处将显示各数据源的采集影响。';
        }
      }

      /* ------------------------------------------------------------------
         Persistence (localStorage)
         ------------------------------------------------------------------ */
      function loadFromStorage() {
        try {
          var data = localStorage.getItem(STORAGE_KEY);
          if (data) {
            var parsed = JSON.parse(data);
            if (Array.isArray(parsed)) {
              tags = parsed.filter(function(t) { return typeof t === 'string' && t.trim(); });
            }
          }
        } catch (e) {
          console.warn('Failed to load interests from localStorage:', e);
        }
        renderTags();
      }

      function saveToStorage() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(tags));
          isDirty = false;
          showToast('关注领域已保存到本地', 'success');
        } catch (e) {
          showToast('保存失败: ' + e.message, 'error');
        }
      }

      /* ------------------------------------------------------------------
         Export YAML
         ------------------------------------------------------------------ */
      function generateYAML() {
        var lines = [];
        lines.push('# =============================================================================');
        lines.push('# OhMyInfo — \u7528\u6237\u504F\u597D\u914D\u7F6E\u6587\u4EF6');
        lines.push('# =============================================================================');
        lines.push('# \u672C\u6587\u4EF6\u7531\u5173\u6CE8\u9886\u57DF\u7BA1\u7406\u9875\u9762\u81EA\u52A8\u751F\u6210');
        lines.push('# =============================================================================');
        lines.push('');
        lines.push('preferences:');
        lines.push('  interests:');
        lines.push('    include_keywords:');

        if (tags.length === 0) {
          lines.push('      # (\u6682\u65E0\u5173\u6CE8\u5173\u952E\u8BCD)');
        } else {
          tags.forEach(function(tag) {
            lines.push('      - "' + tag + '"');
          });
        }

        lines.push('');
        lines.push('    # exclude_keywords:');
        lines.push('    #   - "example"');
        lines.push('');
        lines.push('  scoring:');
        lines.push('    threshold: 30');
        lines.push('');
        lines.push('  output:');
        lines.push('    language: "zh"');
        lines.push('    max_items_per_category: 10');
        lines.push('    include_summary: true');
        lines.push('');
        lines.push('  schedule:');
        lines.push('    runs_per_day: 4');
        lines.push('    preferred_times:');
        lines.push('      - "06:00"');
        lines.push('      - "12:00"');
        lines.push('      - "18:00"');
        lines.push('      - "23:00"');

        return lines.join('\n');
      }

      function openExportModal() {
        yamlOutput.value = generateYAML();
        exportModal.classList.add('open');
      }

      function closeExportModal() {
        exportModal.classList.remove('open');
      }

      /* ------------------------------------------------------------------
         Reset to defaults
         ------------------------------------------------------------------ */
      function resetToDefaults() {
        if (tags.length === 0) {
          showToast('已经是默认状态', 'info');
          return;
        }

        if (confirm('确定要清空所有关注领域吗？')) {
          tags = [];
          isDirty = true;
          renderTags();
          showToast('已恢复默认', 'info');
        }
      }

      /* ------------------------------------------------------------------
         Copy YAML
         ------------------------------------------------------------------ */
      function copyYAML() {
        yamlOutput.select();
        yamlOutput.setSelectionRange(0, 99999);
        try {
          var successful = document.execCommand('copy');
          if (successful) {
            showToast('YAML 配置已复制到剪贴板', 'success');
          } else {
            showToast('复制失败，请手动选择复制', 'error');
          }
        } catch (e) {
          // Fallback: use the modern clipboard API
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(yamlOutput.value).then(function() {
              showToast('YAML 配置已复制到剪贴板', 'success');
            }).catch(function() {
              showToast('复制失败，请手动选择复制', 'error');
            });
          } else {
            showToast('复制失败，请手动选择复制', 'error');
          }
        }
      }

      /* ------------------------------------------------------------------
         Event Bindings
         ------------------------------------------------------------------ */
      saveBtn.addEventListener('click', saveToStorage);
      exportBtn.addEventListener('click', openExportModal);
      resetBtn.addEventListener('click', resetToDefaults);
      clearAllBtn.addEventListener('click', resetToDefaults);

      modalClose.addEventListener('click', closeExportModal);
      modalCloseBtn.addEventListener('click', closeExportModal);
      exportModal.addEventListener('click', function(e) {
        if (e.target === exportModal) closeExportModal();
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && exportModal.classList.contains('open')) {
          closeExportModal();
        }
      });

      yamlCopyBtn.addEventListener('click', copyYAML);

      /* ------------------------------------------------------------------
         Warn before leaving with unsaved changes
         ------------------------------------------------------------------ */
      window.addEventListener('beforeunload', function(e) {
        if (isDirty) {
          e.preventDefault();
          e.returnValue = '有关注领域尚未保存，确定离开吗？';
          return e.returnValue;
        }
      });

      /* ------------------------------------------------------------------
         Theme detection
         ------------------------------------------------------------------ */
      function applyTheme() {
        var saved = localStorage.getItem('ohmyinfo_theme');
        if (saved === 'dark' || saved === 'light') {
          document.documentElement.setAttribute('data-theme', saved);
          return;
        }
        // System preference
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
          document.documentElement.setAttribute('data-theme', 'light');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      }

      // Listen for system preference changes
      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function(e) {
          if (!localStorage.getItem('ohmyinfo_theme')) {
            document.documentElement.setAttribute('data-theme', e.matches ? 'light' : 'dark');
          }
        });
      }

      /* ------------------------------------------------------------------
         Init
         ------------------------------------------------------------------ */
      function init() {
        applyTheme();
        loadFromStorage();
        renderSuggestions();
        updateRadar();
        tagInput.focus();
      }

      // Expose for debugging
      window.__ohmyinfo = { tags: tags, addTag: addTag, removeTag: removeTag };

      init();
    })();
  </script>
</body>
</html>

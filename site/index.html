<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔭 OhMyInfo — 消除技术信息差</title>
<link rel="stylesheet" href="styles.css">
<style>
.landing { max-width: 600px; margin: 5rem auto; text-align: center; padding: 0 1.5rem; }
.landing h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.75rem; }
.landing .sub { color: var(--text-secondary); line-height: 1.7; margin-bottom: 2.5rem; }
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; max-width: 420px; margin: 0 auto; }
.cards a { display: block; padding: 1.5rem; border-radius: 12px; background: var(--bg-card); border: 1px solid var(--border-color); text-decoration: none; color: var(--text-primary); transition: all 0.2s; }
.cards a:hover { border-color: var(--accent); transform: translateY(-2px); }
.cards .icon { font-size: 2rem; margin-bottom: 0.5rem; }
.cards .label { font-weight: 600; margin-bottom: 0.25rem; }
.cards .desc { font-size: 0.8rem; color: var(--text-tertiary); }
.footer { margin-top: 3rem; font-size: 0.8rem; color: var(--text-tertiary); }
@media (max-width:480px) { .cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="landing">
  <h1>🔭 OhMyInfo</h1>
  <p class="sub">AI 驱动的个人技术情报系统。<br>自动采集、理解、筛选全球技术动态，消除信息差。</p>
  <div class="cards">
    <a href="./daily/"><div class="icon">📰</div><div class="label">今日日报</div><div class="desc">查看最新的技术情报摘要</div></a>
    <a href="./preferences.html"><div class="icon">🎯</div><div class="label">关注领域</div><div class="desc">设置你感兴趣的技术方向</div></a>
  </div>
  <div class="footer">GitHub Pages · <a href="https://github.com/silisland/OhMyInfo">silisland/OhMyInfo</a></div>
</div>
</body>
</html>

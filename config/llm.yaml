# =============================================================================
# OhMyInfo — LLM 模型配置文件
# =============================================================================
# 本文件定义 AI 评分、摘要、翻译所使用的 LLM 模型和提示词模板。
# 支持多 Provider 切换，用户可按需选择不同模型完成不同任务。
# =============================================================================

# ---------------------------------------------------------------------------
# 公共默认值锚
# ---------------------------------------------------------------------------
_default_provider: &default_provider
  temperature: 0.3             # 生成温度，越低越确定性（评分用低值）
  max_tokens: 500              # 最大输出 token 数

# ---------------------------------------------------------------------------
# LLM 全局配置
# ---------------------------------------------------------------------------
llm:
  # 默认 Provider，当具体任务未指定时回退至此
  default_provider: "openrouter"   # openai / gemini / openrouter / anthropic / deepseek / ollama

  # ---- 模型提供商定义 -----------------------------------------------------
  providers:

    # OpenAI（GPT 系列，通用能力最强）
    openai:
      model: "gpt-4o-mini"     # 性价比最高的模型，适合批量评分
      <<: *default_provider
      api_key_env: "OPENAI_API_KEY"   # 从环境变量读取 API Key

    # Google Gemini（Flash 系列，速度和价格优势）
    gemini:
      model: "gemini-2.0-flash"
      <<: *default_provider
      api_key_env: "GEMINI_API_KEY"

    # 本地部署 Ollama（完全离线，零成本）
    ollama:
      model: "llama3.2"        # 本地模型名称（需提前 pull）
      base_url: "http://localhost:11434"  # Ollama 默认地址
      <<: *default_provider
      api_key_env: ""           # 本地部署无需 API Key

    # OpenRouter（统一 API 网关，支持 100+ 模型）
    # 提供大量免费模型，适合低成本入门
    # 免费模型列表: https://openrouter.ai/models?order=newest&free=1
    openrouter:
      model: "google/gemma-4-31b"   # 免费模型，速度快
      base_url: "https://openrouter.ai/api/v1"
      <<: *default_provider
      api_key_env: "OPENROUTER_API_KEY"
      extra_headers:
        HTTP-Referer: "https://github.com/silisland/OhMyInfo"
        X-Title: "OhMyInfo"

    # ---- 预留 Provider（取消注释即可启用）----------------------------------
    # anthropic:
    #   model: "claude-sonnet-4-20250514"
    #   <<: *default_provider
    #   api_key_env: "ANTHROPIC_API_KEY"
    #
    # deepseek:
    #   model: "deepseek-chat"
    #   <<: *default_provider
    #   api_key_env: "DEEPSEEK_API_KEY"

  # ---- 任务级模型配置 -----------------------------------------------------
  # 每个任务可指定不同的 Provider 和模型，实现"最佳工具做最佳事"
  tasks:
    # 文章评分：使用 OpenRouter 免费模型，零成本运行
    scoring:
      provider: "openrouter"
      model: "google/gemma-4-31b"
      prompt_template: >
        Score this article 0-10 based on technical depth,
        novelty, and relevance to developers.
        Article title: {title}
        Summary: {summary}

    # 中文摘要：OpenRouter 免费模型
    summarization:
      provider: "openrouter"
      model: "google/gemma-4-31b"
      prompt_template: >
        用中文总结以下技术文章的要点（2-3句话）：
        {title}

        {content}

    # 英译中：与摘要共用 OpenRouter
    translation:
      provider: "openrouter"
      model: "google/gemma-4-31b"
      prompt_template: >
        将以下英文技术内容翻译为中文：
        {content}

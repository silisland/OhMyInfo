# =============================================================================
# OhMyInfo — 用户偏好配置文件
# =============================================================================
# 本文件定义用户的兴趣偏好、评分权重、输出格式和调度策略。
# 用户可根据自身需求调整这些参数来定制每日技术情报。
# =============================================================================

# ---------------------------------------------------------------------------
# 默认值锚
# ---------------------------------------------------------------------------
_default_weights: &default_weights
  recency_weight: 0.3         # 时效性权重 — 越新越高
  source_weight: 0.2          # 来源权威性权重 — 优质源加分
  engagement_weight: 0.25     # 互动热度权重 — 点赞/评论/收藏
  novelty_weight: 0.15        # 新颖性权重 — 与历史内容的差异度
  impact_weight: 0.1          # 影响力权重 — 作者/机构/被引用

# ---------------------------------------------------------------------------
# 用户偏好
# ---------------------------------------------------------------------------
preferences:

  # ---- 兴趣关键词 ---------------------------------------------------------
  interests:
    # 包含关键词：匹配的文章获得加分
    include_keywords:
      - "AI"
      - "machine learning"
      - "LLM"
      - "Rust"
      - "Python"
      - "open source"
      - "developer tools"

    # 排除关键词：匹配的文章将被过滤掉
    exclude_keywords:
      - "crypto"
      - "NFT"
      - "gaming"

  # ---- 评分系统 -----------------------------------------------------------
  scoring:
    # 最低门槛分数（0-100），低于此值不展示在日报中
    threshold: 30

    # 各维度权重（总和必须为 1.0）
    <<: *default_weights

  # ---- 输出配置 -----------------------------------------------------------
  output:
    language: "zh"             # 输出语言: zh（中文）/ en（英文）/ auto（跟随原文）
    max_items_per_category: 10 # 每个分类最多展示条目
    include_summary: true      # 是否包含 AI 摘要
    include_scores: true       # 是否展示每篇文章的评分

  # ---- 定时调度 -----------------------------------------------------------
  schedule:
    runs_per_day: 4            # 每日运行次数
    preferred_times:           # 期望推送时间（24 小时制）
      - "06:00"                # 早间日报
      - "12:00"                # 午间速览
      - "18:00"                # 晚间精选
      - "23:00"                # 夜间回顾

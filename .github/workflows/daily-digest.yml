# =============================================================================
# OhMyInfo — Daily Digest Pipeline
# =============================================================================
# Runs the full OhMyInfo pipeline on a schedule, generating a daily technical
# digest and deploying it to GitHub Pages.
#
# Triggers:
#   - Scheduled: every 6 hours (UTC)
#   - Manual: via workflow_dispatch with optional debug mode
#
# Deployment:
#   - peaceiris/actions-gh-pages@v4 publishes ./site to gh-pages branch
#   - GitHub Pages serves from gh-pages branch
# =============================================================================

name: Daily Digest

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger
    inputs:
      debug:
        description: 'Run with debug output'
        default: false
        type: boolean

# =============================================================================
# Permissions
# =============================================================================
permissions:
  contents: write       # Allow pushing to gh-pages branch
  pages: write          # Allow deploying to GitHub Pages
  id-token: write       # Needed for OIDC token

# =============================================================================
# Environment Variables
# =============================================================================
env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  OUTPUT_DIR: "./site/daily"

# =============================================================================
# Concurrency: prevent overlapping runs
# =============================================================================
concurrency:
  group: "pages"
  cancel-in-progress: false

# =============================================================================
# Jobs
# =============================================================================
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout code
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Setup Python
      # -----------------------------------------------------------------------
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      # -----------------------------------------------------------------------
      # Step 3: Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # Step 4: Create .env file from secrets
      # -----------------------------------------------------------------------
      - name: Create .env file
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

      # -----------------------------------------------------------------------
      # Step 5: Debug info (if enabled)
      # -----------------------------------------------------------------------
      - name: Debug information
        if: ${{ inputs.debug == true }}
        run: |
          echo "=== Git Status ==="
          git status
          echo "=== Python Version ==="
          python --version
          echo "=== Installed Packages ==="
          pip list
          echo "=== Environment (.env masked) ==="
          cat .env | sed 's/=.*/=***MASKED***/g'
          echo "=== Config Files ==="
          ls -la config/
          echo "=== Source Tree ==="
          find src/ -type f -name "*.py" | sort

      # -----------------------------------------------------------------------
      # Step 6: Run the pipeline
      # -----------------------------------------------------------------------
      - name: Run OhMyInfo pipeline
        run: python -m src.processors.pipeline

      # -----------------------------------------------------------------------
      # Step 7: Post-pipeline processing — copy latest, build index
      # -----------------------------------------------------------------------
      - name: Post-process pipeline output
        run: |
          # Find the most recently generated digest
          LATEST=$(ls -t site/daily/*.md 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            LATEST_NAME=$(basename "$LATEST")
            echo "Latest digest: $LATEST_NAME"

            # Copy as latest.md (for predictable URL)
            cp "$LATEST" site/daily/latest.md
            echo "Copied to site/daily/latest.md"
          fi

      # -----------------------------------------------------------------------
      # Step 8: Verify site structure
      # -----------------------------------------------------------------------
      - name: Verify site structure
        run: |
          echo "=== Site Contents ==="
          find site/ -type f | sort
          echo "=== Digests ==="
          ls -la site/daily/ 2>/dev/null || echo "No digests yet"

      # -----------------------------------------------------------------------
      # Step 9: Deploy to GitHub Pages
      # -----------------------------------------------------------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          full_commit_message: |
            ohmyinfo: daily digest update

            Automated deployment of OhMyInfo daily digest.
            Trigger: ${{ github.event_name }}
            Timestamp: ${{ github.event.repository.updated_at }}
